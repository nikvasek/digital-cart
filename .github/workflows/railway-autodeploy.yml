name: Railway Auto Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: railway-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: be731b3e-9ceb-473c-8725-606baa996b37

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy backend
        run: railway up backend --path-as-root --service backend --project "$RAILWAY_PROJECT_ID" --ci

      - name: Deploy frontend
        run: railway up frontend --path-as-root --service frontend --project "$RAILWAY_PROJECT_ID" --ci
